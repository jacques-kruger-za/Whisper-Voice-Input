name: CI

on:
  push:
    branches:
      - main
      - chore/**
      - fix/**
      - feat/**
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Verify Python source compiles
        run: python -m compileall src tests

      - name: Run repository verification script
        run: python tests/verify_widget_sizes.py
